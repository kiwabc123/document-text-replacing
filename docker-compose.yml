version: '3.8'

services:
  # Python server (API + LibreOffice)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - invoice-network
    restart: unless-stopped

networks:
  invoice-network:
    driver: bridge
